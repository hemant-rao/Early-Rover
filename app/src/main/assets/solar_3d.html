<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Solaris Interactive 3D Compass</title>
    <style>
        body, html {
            background-color: transparent !important;
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            user-select: none;
            -webkit-user-select: none;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            background-color: transparent !important;
        }
    </style>
    <!-- Three.js r150 vendored locally in assets for offline reliability (no network needed) -->
    <script src="three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>

    <script>
        // High-fidelity performance & visual parameters
        let scene, camera, renderer, animationFrameId;
        let isLoopRunning = true;

        // Visual nodes
        let sunMesh, sunGlowMesh, orbitLine;
        let sunMarkerPlanet, sunriseMarker, sunsetMarker;
        let starsField;

        // Custom Plasma Shader Uniforms
        let uTime = 0;
        const clock = new THREE.Clock();

        // Orbit specifications
        const orbitXRadius = 3.6;
        const orbitZRadius = 2.4;

        // Smooth tracker travel: lerp a displayed hour toward the latest time from Kotlin
        // so the planet glides along the orbit instead of snapping on each 10s update.
        let targetHour = null;   // most recent currentHour pushed from Android
        let displayHour = null;  // animated value following targetHour

        // Input rotation / zoom tracking
        let isPointerDown = false;
        let pointerX = 0, pointerY = 0;
        let targetRotationX = 0.35; // base 3/4 perspective tilt
        let targetRotationY = -0.4; // slight side layout start
        let currentRotationX = 0.35;
        let currentRotationY = -0.4;
        let cameraZoom = 4.8;
        let targetZoom = 4.8;
        let pinchDistance = 0;

        // 3D Solar Plasma shader program - procedural moving solar flare fields
        const plasmaVertexShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vPosition;
            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                vPosition = position;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const plasmaFragmentShader = `
            uniform float uTime;
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vPosition;

            // Classic Perlin 3D Noise mathematical algorithm
            vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
            vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}

            float snoise(vec3 v){
                const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);

                vec3 i  = floor(v + dot(v, C.yyy));
                vec3 x0 = v - i + dot(i, C.xxx);

                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min(g.xyz, l.zxy);
                vec3 i2 = max(g.xyz, l.zxy);

                vec3 x1 = x0 - i1 + 1.0 * C.xxx;
                vec3 x2 = x0 - i2 + 2.0 * C.xxx;
                vec3 x3 = x0 - D.yyy;

                i = mod(i, 289.0);
                vec4 p = permute(permute(permute(
                            i.z + vec4(0.0, i1.z, i2.z, 1.0))
                        + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                        + i.x + vec4(0.0, i1.x, i2.x, 1.0));

                float n_ = 0.142857142857;
                vec3 ns = n_ * D.wyz - D.xzx;

                vec4 j = p - 49.0 * floor(p * ns.z *ns.z);

                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_);

                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);

                vec4 b0 = vec4(x.xy, y.xy);
                vec4 b1 = vec4(x.zw, y.zw);

                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));

                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;

                vec3 p0 = vec3(a0.xy, h.x);
                vec3 p1 = vec3(a0.zw, h.y);
                vec3 p2 = vec3(a1.xy, h.z);
                vec3 p3 = vec3(a1.zw, h.w);

                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x;
                p1 *= norm.y;
                p2 *= norm.z;
                p3 *= norm.w;

                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
            }

            void main() {
                // Layered noise mapping for interactive solar surface
                float n1 = snoise(vPosition * 1.8 + vec3(0.0, 0.0, uTime * 0.35));
                float n2 = snoise(vPosition * 3.5 + vec3(0.0, uTime * 0.5, 0.0)) * 0.5;
                float combinedNoise = (n1 + n2 + 1.5) / 3.0;

                // Fire solar core colors
                vec3 crimsonRed = vec3(0.9, 0.18, 0.0);
                vec3 richGold = vec3(1.0, 0.58, 0.0);
                vec3 coreYellow = vec3(1.0, 0.96, 0.52);

                vec3 plasmaColor = mix(crimsonRed, richGold, combinedNoise);
                plasmaColor = mix(plasmaColor, coreYellow, pow(combinedNoise, 2.2));

                // Add Fresnel glow at core edges
                float edgeGlow = pow(1.0 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.2);
                plasmaColor += coreYellow * edgeGlow * 0.8;

                gl_FragColor = vec4(plasmaColor, 1.0);
            }
        `;

        function init() {
            const container = document.getElementById('canvas-container');
            const viewWidth = container.clientWidth;
            const viewHeight = container.clientHeight;

            // 1. Setup Scene, transparent background
            scene = new THREE.Scene();

            // 2. Tilted Perspective Camera
            camera = new THREE.PerspectiveCamera(45, viewWidth / viewHeight, 0.1, 100);
            updateCameraPosition();

            // 3. WebGL Renderer with Alpha compatibility
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(viewWidth, viewHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // capped to 2 for performance
            renderer.setClearColor(0x000000, 0); // fully transparent
            container.appendChild(renderer.domElement);

            // 4. Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
            scene.add(ambientLight);

            const solarDirectional = new THREE.DirectionalLight(0xfffaed, 1.2);
            solarDirectional.position.set(5, 5, 5);
            scene.add(solarDirectional);

            // 5. SUN BULB: Custom Shaded Solar Sphere
            const sunGeo = new THREE.SphereGeometry(0.85, 32, 32);
            const sunMat = new THREE.ShaderMaterial({
                vertexShader: plasmaVertexShader,
                fragmentShader: plasmaFragmentShader,
                uniforms: {
                    uTime: { value: 0 }
                }
            });
            sunMesh = new THREE.Mesh(sunGeo, sunMat);
            scene.add(sunMesh);

            // 5b. SUN GLOW EXTENSION: Additive Atmosphere Halo
            const glowGeo = new THREE.SphereGeometry(1.22, 32, 32);
            const glowMat = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow(0.68 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.5);
                        gl_FragColor = vec4(1.0, 0.55, 0.1, 1.0) * intensity;
                    }
                `,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                transparent: true
            });
            sunGlowMesh = new THREE.Mesh(glowGeo, glowMat);
            scene.add(sunGlowMesh);

            // 6. RING ELLIPTICAL ORBIT: Soft neon trajectory ribbon
            const orbitPoints = [];
            const divisions = 120;
            for (let i = 0; i <= divisions; i++) {
                const angle = (i / divisions) * Math.PI * 2;
                orbitPoints.push(new THREE.Vector3(
                    orbitXRadius * Math.cos(angle),
                    0,
                    orbitZRadius * Math.sin(angle)
                ));
            }
            const orbitGeo = new THREE.BufferGeometry().setFromPoints(orbitPoints);
            const orbitMat = new THREE.LineBasicMaterial({
                color: 0x4A90FA, // Solari Sky Blue
                transparent: true,
                opacity: 0.45,
                linewidth: 2.0
            });
            orbitLine = new THREE.Line(orbitGeo, orbitMat);
            scene.add(orbitLine);

            // 7. ASTRONOMICAL SENSORY MARKERS (Constructing the Planet and triggers)
            // A: Sunrise Core Point (Solar Orange)
            const sunriseGeo = new THREE.SphereGeometry(0.16, 16, 16);
            const sunriseMat = new THREE.MeshBasicMaterial({ color: 0xFF6B35 });
            sunriseMarker = new THREE.Mesh(sunriseGeo, sunriseMat);
            scene.add(sunriseMarker);

            // B: Sunset State Point (Crimson Twilight Pink)
            const sunsetGeo = new THREE.SphereGeometry(0.16, 16, 16);
            const sunsetMat = new THREE.MeshBasicMaterial({ color: 0xEC4899 });
            sunsetMarker = new THREE.Mesh(sunsetGeo, sunsetMat);
            scene.add(sunsetMarker);

            // C: Active Tracking Planetary Marker (With distinct inner capsule glow)
            const trackerContainerGeo = new THREE.Group();
            const trackerGeo = new THREE.SphereGeometry(0.24, 16, 16);
            const trackerMat = new THREE.MeshStandardMaterial({
                color: 0x7A66F9, // Deep Indigo Purp
                roughness: 0.1,
                metalness: 0.8,
                emissive: 0x312E81
            });
            const trackerMesh = new THREE.Mesh(trackerGeo, trackerMat);
            trackerContainerGeo.add(trackerMesh);

            // Ring around planet
            const pRingGeo = new THREE.RingGeometry(0.32, 0.38, 30);
            const pRingMat = new THREE.MeshBasicMaterial({ color: 0x8B9DFF, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
            const pRing = new THREE.Mesh(pRingGeo, pRingMat);
            pRing.rotation.x = Math.PI / 2;
            trackerContainerGeo.add(pRing);

            sunMarkerPlanet = trackerContainerGeo;
            scene.add(sunMarkerPlanet);

            // 8. PARTICLE FLOATING STARS BACKGROUND
            const starsCount = 180;
            const starsGeo = new THREE.BufferGeometry();
            const positions = new Float32Array(starsCount * 3);
            const starSpeeds = [];

            for (let i = 0; i < starsCount; i++) {
                // Spherical range boundary around sun
                const radius = 5 + Math.random() * 8;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);

                positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = radius * Math.cos(phi);

                starSpeeds.push({
                    speed: 0.05 + Math.random() * 0.15,
                    axis: new THREE.Vector3(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5).normalize(),
                    angle: Math.random() * Math.PI
                });
            }

            starsGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const starsMat = new THREE.PointsMaterial({
                color: 0xE2E8F0,
                size: 0.045,
                transparent: true,
                opacity: 0.75,
                sizeAttenuation: true
            });
            starsField = new THREE.Points(starsGeo, starsMat);
            starsField.userData = { speeds: starSpeeds, positions: positions };
            scene.add(starsField);

            // 9. Attach Touch Listeners
            setupTouchListeners();

            // Default startup data (English coordinates)
            updateSolarTimes(9.65, 5.0, 19.5, true);

            // 10. Start Animation render loops
            animate();

            // Alert Kotlin interface we are loaded and ready
            if (window.SolarJSBridge && window.SolarJSBridge.onHtmlReady) {
                window.SolarJSBridge.onHtmlReady();
            }
        }

        function updateCameraPosition() {
            camera.position.x = cameraZoom * Math.sin(currentRotationY) * Math.cos(currentRotationX);
            camera.position.z = cameraZoom * Math.cos(currentRotationY) * Math.cos(currentRotationX);
            camera.position.y = cameraZoom * Math.sin(currentRotationX);
            camera.lookAt(0, 0, 0);
        }

        // Mapping function for 24H clock orbits
        function getOrbitPosition(hourFloat) {
            // Consistent angle formula mapping sunrise east / sunset west
            const angle = - (hourFloat / 24.0) * 2.0 * Math.PI + (Math.PI / 2.0);
            return {
                x: orbitXRadius * Math.cos(angle),
                z: orbitZRadius * Math.sin(angle)
            };
        }

        // MAIN JS INTERFACE BRIDGE API CALLED FROM KOTLIN ALARMVIEWMODEL
        function updateSolarTimes(currentHour, sunriseHour, sunsetHour, isDark) {
            // Guard: the scene is only built in init() on window 'load'. Kotlin's onPageFinished
            // fallback can fire before that, so ignore calls until the meshes exist.
            if (!sunMarkerPlanet || !orbitLine || !sunriseMarker || !sunsetMarker || !starsField) return;

            // Record the latest time as the target; animate() glides the planet toward it.
            // On the very first update, snap directly so there is no startup sweep.
            targetHour = currentHour;
            if (displayHour === null) {
                displayHour = currentHour;
                const startPos = getOrbitPosition(displayHour);
                sunMarkerPlanet.position.set(startPos.x, 0, startPos.y);
            }

            // Position Sunrise marker
            const risePos = getOrbitPosition(sunriseHour);
            sunriseMarker.position.set(risePos.x, 0, risePos.y);

            // Position Sunset marker
            const setPos = getOrbitPosition(sunsetHour);
            sunsetMarker.position.set(setPos.x, 0, setPos.y);

            // Update Orbit colors & dynamic accents depending on app theme
            if (isDark) {
                orbitLine.material.color.setHex(0x4B90FA); // Purple Indigo theme active
                starsField.material.color.setHex(0xE2E8F0);
                starsField.material.opacity = 0.85;
            } else {
                orbitLine.material.color.setHex(0x6366F1); // Gold Deep Lavender theme active
                starsField.material.color.setHex(0x475569);
                starsField.material.opacity = 0.35;
            }
        }

        // Visibility toggler callback API
        function setRenderingEnabled(enabled) {
            isLoopRunning = !!enabled;
            if (isLoopRunning) {
                clock.getDelta(); // reset clock delta
                animate();
            } else {
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }
            }
        }

        // Dispose all GPU resources (geometries, materials, renderer) on teardown.
        // Called from Kotlin (Celestial3DView onRelease) before the WebView is destroyed.
        function cleanup() {
            isLoopRunning = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            if (scene) {
                scene.traverse((obj) => {
                    if (obj.geometry) obj.geometry.dispose();
                    if (obj.material) {
                        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
                        mats.forEach((m) => m.dispose());
                    }
                });
            }
            if (renderer) {
                renderer.dispose();
                renderer.forceContextLoss();
            }
        }

        function animate() {
            if (!isLoopRunning) return;

            animationFrameId = requestAnimationFrame(animate);

            uTime += clock.getDelta();
            
            // 1. Progress sun shader time variables
            if (sunMesh && sunMesh.material.uniforms) {
                sunMesh.material.uniforms.uTime.value = uTime;
            }

            // 2. Continuous slight sun rotation & slow glow breathing
            if (sunMesh) {
                sunMesh.rotation.y += 0.0035;
                sunMesh.rotation.z += 0.0012;
            }
            if (sunGlowMesh) {
                const breathing = Math.sin(uTime * 1.5) * 0.04;
                sunGlowMesh.scale.set(1 + breathing, 1 + breathing, 1 + breathing);
            }

            // 3. Glide the tracker planet along the orbit toward the latest time.
            if (sunMarkerPlanet && displayHour !== null && targetHour !== null) {
                // Shortest-path delta on the 24h circle so it never sweeps backwards at midnight.
                let delta = targetHour - displayHour;
                if (delta > 12) delta -= 24;
                else if (delta < -12) delta += 24;
                displayHour = (displayHour + delta * 0.08 + 24) % 24;
                const pos = getOrbitPosition(displayHour);
                sunMarkerPlanet.position.set(pos.x, 0, pos.y);
            }

            // 4. Ambient drift: slowly rotate the star field + gentle camera idle glide
            if (starsField) {
                starsField.rotation.y += 0.0002;
            }
            targetRotationY += 0.0006; // continuous elegant camera glide (auto-orbit)

            // 5. Smooth interpolation (lerp) towards dragging angles
            currentRotationX += (targetRotationX - currentRotationX) * 0.12;
            currentRotationY += (targetRotationY - currentRotationY) * 0.12;
            cameraZoom += (targetZoom - cameraZoom) * 0.1;

            // Enforce Pitch/Vertical rotation boundaries to prevent flipped camera
            currentRotationX = Math.max(-1.1, Math.min(1.1, currentRotationX));

            updateCameraPosition();
            renderer.render(scene, camera);
        }

        // TOUCH AND GESTURES EVENTS
        function setupTouchListeners() {
            const container = document.getElementById('canvas-container');

            container.addEventListener('pointerdown', (e) => {
                isPointerDown = true;
                pointerX = e.clientX;
                pointerY = e.clientY;
                container.setPointerCapture(e.pointerId);
            });

            container.addEventListener('pointermove', (e) => {
                if (!isPointerDown) return;

                const deltaX = e.clientX - pointerX;
                const deltaY = e.clientY - pointerY;

                pointerX = e.clientX;
                pointerY = e.clientY;

                // Adjust rotation speeds
                targetRotationY -= deltaX * 0.006;
                targetRotationX -= deltaY * 0.006;
            });

            container.addEventListener('pointerup', (e) => {
                isPointerDown = false;
                container.releasePointerCapture(e.pointerId);
            });

            // Touch-based double-finger pinch zoom configuration
            let initialDistance = 0;
            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    initialDistance = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                }
            }, { passive: true });

            container.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2 && initialDistance > 0) {
                    const currentDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    const diff = currentDist - initialDistance;
                    initialDistance = currentDist;

                    // Zoom scaling limits
                    targetZoom = Math.max(3.0, Math.min(8.0, targetZoom - diff * 0.025));
                }
            }, { passive: true });

            container.addEventListener('touchend', (e) => {
                if (e.touches.length < 2) {
                    initialDistance = 0;
                }
            }, { passive: true });

            // Resize callback
            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            if (!container) return;
            const width = container.clientWidth;
            const height = container.clientHeight;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();

            renderer.setSize(width, height);
        }

        // Document hidden/visible listener to auto-pause cycles
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                setRenderingEnabled(false);
            } else {
                setRenderingEnabled(true);
            }
        });

        // Initialize scene fully
        window.addEventListener('load', init);

        // Bind callback references to global scope
        window.updateSolarTimes = updateSolarTimes;
        window.setRenderingEnabled = setRenderingEnabled;
        window.cleanup = cleanup;
    </script>
</body>
</html>
