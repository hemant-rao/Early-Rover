<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Sky Sphere</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background-color: #000; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    </style>
    <!-- Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <script>
        let scene, camera, renderer, skyMesh, sunSphere;
        let threeJsLoaded = false;
        
        let currentHourCached = 12.0;

        const vertexShader = `
            varying vec3 vWorldPosition;
            void main() {
                vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                vWorldPosition = worldPosition.xyz;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform vec3 topColor;
            uniform vec3 bottomColor;
            uniform float offset;
            uniform float exponent;
            varying vec3 vWorldPosition;
            void main() {
                float h = normalize(vWorldPosition + offset).y;
                gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
            }
        `;

        function init() {
            if (typeof THREE === 'undefined') {
                console.warn("ThreeJS failed to load.");
                return;
            }
            threeJsLoaded = true;

            const container = document.getElementById('canvas-container');
            const width = window.innerWidth;
            const height = window.innerHeight;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 2000);
            camera.position.set(0, 50, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Sky dome
            const skyGeo = new THREE.SphereGeometry(1000, 32, 15);
            const skyMat = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: {
                    topColor: { value: new THREE.Color(0x0077ff) },
                    bottomColor: { value: new THREE.Color(0xffffff) },
                    offset: { value: 33 },
                    exponent: { value: 0.6 }
                },
                side: THREE.BackSide
            });
            skyMesh = new THREE.Mesh(skyGeo, skyMat);
            scene.add(skyMesh);

            // Sun Sphere
            const sunGeo = new THREE.SphereGeometry(20, 32, 32);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xffffee });
            sunSphere = new THREE.Mesh(sunGeo, sunMat);
            scene.add(sunSphere);
            
            window.addEventListener('resize', onWindowResize);
            
            updateSky(currentHourCached);
            
            animate();
            
            if (window.SolarJSBridge && window.SolarJSBridge.onHtmlReady) {
                window.SolarJSBridge.onHtmlReady();
            }
        }

        function onWindowResize() {
            if (!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateSolarTimes(currentHour, sunriseHour, sunsetHour, isDark) {
            currentHourCached = currentHour;
            if (threeJsLoaded) {
                updateSky(currentHour);
            }
        }

        function updateSky(hour) {
            // Sun angle: hour 6 is sunrise (0 deg), 12 is noon (90 deg), 18 is sunset (180 deg)
            const sunAngle = (hour - 6) / 12 * Math.PI;
            
            // Position sun (distance 800)
            const sunDistance = 800;
            sunSphere.position.x = Math.cos(sunAngle) * sunDistance;
            sunSphere.position.y = Math.sin(sunAngle) * sunDistance;
            sunSphere.position.z = -200; // slightly behind

            let topColor = new THREE.Color();
            let bottomColor = new THREE.Color();

            if (hour > 5.5 && hour < 6.5) {
                // Sunrise
                topColor.setHex(0x738bcf);
                bottomColor.setHex(0xffaa55);
            } else if (hour >= 6.5 && hour <= 17.5) {
                // Day
                topColor.setHex(0x0077ff);
                bottomColor.setHex(0xffffff);
            } else if (hour > 17.5 && hour < 18.5) {
                // Sunset
                topColor.setHex(0x4a4f8f);
                bottomColor.setHex(0xff7733);
            } else {
                // Night
                topColor.setHex(0x05051a);
                bottomColor.setHex(0x000000);
            }

            skyMesh.material.uniforms.topColor.value.copy(topColor);
            skyMesh.material.uniforms.bottomColor.value.copy(bottomColor);
        }

        function animate() {
            requestAnimationFrame(animate);
            // Slowly rotate camera to make the sky feel alive
            camera.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }

        window.addEventListener('load', init);
        window.updateSolarTimes = updateSolarTimes;
    </script>
</body>
</html>
